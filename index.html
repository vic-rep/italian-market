<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trusti — Verifica la tua RC Auto in 10 secondi</title>
    <meta
      name="description"
      content="Inserisci la targa e scopri subito stato, scadenza e classe di merito della tua RC Auto. Gratis, senza registrazione. Trusti, broker assicurativo autorizzato."
    />
    <meta name="theme-color" content="#F9FAF5" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0A1517" media="(prefers-color-scheme: dark)" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Nunito:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <script>
      // Apply persisted theme + locale before paint to avoid a flash of the wrong theme.
      (function () {
        try {
          var t = localStorage.getItem('trusti-theme');
          if (t !== 'light' && t !== 'dark') {
            t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.setAttribute('data-theme', t);
          var l = localStorage.getItem('trusti-locale');
          if (l !== 'en' && l !== 'it') l = 'it';
          document.documentElement.lang = l;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
